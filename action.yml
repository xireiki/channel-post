name: 'Channel Post'
description: 'Push files to Telegram channel with session caching'
author: 'xireiki'
branding:
  icon: 'edit'
  color: 'white'
inputs:
  bot_token:
    description: 'Telegram Bot Token'
    required: true
  chat_id:
    description: 'Telegram Channel/Chat ID'
    required: true
  context:
    description: 'Caption'
    required: false
    default: ''
  path:
    description: 'File Path'
    required: false
  parse_mode:
    description: 'Parse Mode'
    required: false
    default: ''
  method:
    description: 'Occurrence method, default sendDocument'
    required: false
    default: 'sendDocument'
  large_file:
    description: 'Enable large file support, api_id and api_hash are required after enabling'
    required: false
    default: false
  api_id:
    description: 'Telegram Developer api_id'
    required: false
    default: -1
  api_hash:
    description: 'Telegram Developer api_hash'
    required: false
    default: ''
  topic_id:
    description: 'The ID of the super group subtopic'
    required: false
  cache_session:
    description: 'Enable session caching to avoid repeated logins'
    required: false
    default: 'true'

outputs:
  msgId:
    description: "msgid of the sent message"

runs:
  using: 'node20'
  main: 'dist/bundle.js'
